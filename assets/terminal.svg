<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- Import Google Font VT323 (Retro Pixel Terminal Font) -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
      
      .terminal-window {
        fill: #08090d;
        stroke: #39FF14;
        stroke-width: 2.5;
        rx: 10;
      }
      
      .terminal-header {
        fill: #12151f;
        stroke: #39FF14;
        stroke-width: 2.5;
      }
      
      .control-btn {
        stroke-width: 1.5;
      }
      
      .control-btn.close {
        fill: #ff5f56;
        stroke: #e0443e;
      }
      
      .control-btn.minimize {
        fill: #ffbd2e;
        stroke: #dca01e;
      }
      
      .control-btn.maximize {
        fill: #27c93f;
        stroke: #1aab2f;
      }
      
      .text-green {
        fill: #39FF14;
        font-family: 'VT323', 'Courier New', monospace;
        font-size: 21px;
        letter-spacing: 1px;
      }
      
      .text-amber {
        fill: #FFB000;
        font-family: 'VT323', 'Courier New', monospace;
        font-size: 21px;
        letter-spacing: 1px;
      }
      
      .text-red {
        fill: #FF3333;
        font-family: 'VT323', 'Courier New', monospace;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      
      .scanline {
        fill: url(#scanline-pattern);
        opacity: 0.12;
      }
      
      .blink {
        animation: blink-anim 1s infinite steps(2, start);
      }
      
      @keyframes blink-anim {
        to { opacity: 0; }
      }
    </style>
    
    <pattern id="scanline-pattern" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#000" stroke-width="2" />
    </pattern>
    
    <!-- CRT glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Typing animation clip-paths -->
    <clipPath id="clip1">
      <rect x="25" y="50" width="0" height="35">
        <animate attributeName="width" from="0" to="750" dur="1.2s" begin="0.5s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="25" y="80" width="0" height="35">
        <animate attributeName="width" from="0" to="750" dur="1.5s" begin="2.0s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="25" y="110" width="0" height="35">
        <animate attributeName="width" from="0" to="750" dur="1.5s" begin="3.8s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip4">
      <rect x="25" y="145" width="0" height="35">
        <animate attributeName="width" from="0" to="750" dur="1.8s" begin="5.5s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip5">
      <rect x="25" y="185" width="0" height="35">
        <animate attributeName="width" from="0" to="750" dur="1.8s" begin="7.5s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip6">
      <rect x="25" y="225" width="0" height="35">
        <animate attributeName="width" from="0" to="750" dur="1.8s" begin="9.5s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="clip7">
      <rect x="25" y="265" width="0" height="35">
        <animate attributeName="width" from="0" to="750" dur="1.2s" begin="11.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal Window Background -->
  <rect x="5" y="5" width="790" height="340" class="terminal-window" filter="url(#glow)"/>
  
  <!-- Terminal Header -->
  <path d="M 5 25 A 20 20 0 0 1 25 5 L 775 5 A 20 20 0 0 1 795 25 L 795 40 L 5 40 Z" class="terminal-header" />
  
  <!-- Window Controls -->
  <circle cx="25" cy="22" r="6" class="control-btn close" />
  <circle cx="45" cy="22" r="6" class="control-btn minimize" />
  <circle cx="65" cy="22" r="6" class="control-btn maximize" />
  
  <!-- Terminal Title -->
  <text x="400" y="26" fill="#39FF14" font-family="'VT323', monospace" font-size="16" text-anchor="middle" letter-spacing="2">GIBSON@YAGAMI-MURAKAMI: ~</text>

  <!-- CRT Screen Scanlines -->
  <rect x="5" y="5" width="790" height="340" class="scanline" pointer-events="none" />

  <!-- Terminal Output Lines -->
  <!-- Line 1: Bootup -->
  <text x="25" y="75" class="text-green" clip-path="url(#clip1)" filter="url(#glow)">&gt; GIBSON OS v1.995 - BOOT SEQUENCE INITIALIZED...</text>
  
  <!-- Line 2: Connection -->
  <text x="25" y="105" class="text-green" clip-path="url(#clip2)" filter="url(#glow)">&gt; CONNECTING TO PORT 23 (TELNET)... RESOLVING GIBSON MAINFRAME...</text>
  
  <!-- Line 3: Firewall bypass -->
  <text x="25" y="135" class="text-amber" clip-path="url(#clip3)" filter="url(#glow)">&gt; [CONNECTED] BYPASSING ELLINGSON MINERAL CORP FIREWALL...</text>
  
  <!-- Line 4: Warning / Malware -->
  <text x="25" y="170" class="text-red" clip-path="url(#clip4)" filter="url(#glow)">&gt;&gt; WARNING: DA VINCI VIRUS DETECTED - SYSTEM UNDER OVERLOAD &lt;&lt;</text>
  
  <!-- Line 5: Identity check -->
  <text x="25" y="210" class="text-green" clip-path="url(#clip5)" filter="url(#glow)">&gt; WHOAMI: YAGAMI-MURAKAMI // IDENTITY VERIFIED // ACCESS GRANTED.</text>

  <!-- Line 6: Quote -->
  <text x="25" y="250" class="text-amber" clip-path="url(#clip6)" filter="url(#glow)">&gt; "MESS WITH THE BEST, DIE LIKE THE REST." - HACK THE PLANET!</text>
  
  <!-- Line 7: Interactive CLI invite -->
  <text x="25" y="290" class="text-green" clip-path="url(#clip7)" filter="url(#glow)">
    &gt; yagami@gibson:~$ ./init_cyberdeck.sh <tspan class="blink">█</tspan>
  </text>
</svg>
